<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Portal Inmobiliario PNK</title>
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo i { font-size: 50px; color: #1a2a6c; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
        button {
            width: 100%;
            background: #1a2a6c;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #1a2a6c; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-key"></i>
            <h2>Recuperar Contraseña</h2>
            <p>Te enviaremos un enlace para restablecer tu contraseña</p>
        </div>
        <form id="formRecuperar">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="correo" placeholder="ejemplo@dominio.com" required>
            </div>
            <button type="submit"><i class="fas fa-paper-plane"></i> Enviar enlace</button>
        </form>
        <div class="back-link">
            <a href="login.html"><i class="fas fa-arrow-left"></i> Volver al inicio de sesión</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.getElementById('formRecuperar').addEventListener('submit', function(e) {
            e.preventDefault();
            const correo = document.getElementById('correo').value;
            
            if (!correo) {
                Swal.fire('Error', 'Ingrese su correo electrónico', 'error');
                return;
            }
            
            fetch('backend/recuperarPassword.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ correo: correo })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    Swal.fire('¡Revisa tu correo!', 'Te hemos enviado un enlace para recuperar tu contraseña', 'success')
                        .then(() => window.location.href = 'login.html');
                } else {
                    Swal.fire('Error', data.error, 'error');
                }
            });
        });
    </script>
</body>
</html>
