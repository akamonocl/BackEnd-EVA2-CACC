<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búsqueda Avanzada - Portal Inmobiliario PNK</title>
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fb; }
        
        .header { background: #1a1a2e; color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
        .header a { color: white; text-decoration: none; margin-left: 20px; }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: #fdbb4d; }
        
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        .search-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        .search-title { margin-bottom: 20px; color: #1a2a6c; }
        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .filter-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .filter-group input, .filter-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
        .search-btn {
            background: #1a2a6c;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .property-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            cursor: pointer;
        }
        .property-card:hover { transform: translateY(-3px); }
        .property-image { height: 180px; background-size: cover; background-position: center; position: relative; }
        .property-price {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: #fdbb4d;
            padding: 4px 10px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .property-info { padding: 12px; }
        .property-title { font-weight: 600; font-size: 0.95rem; }
        .property-location { font-size: 0.75rem; color: #666; margin: 5px 0; }
        
        .footer { background: #1a1a2e; color: white; padding: 30px; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <img src="assets/pnk.png" alt="PNK Inmobiliaria" class="logo-img">
            <div class="logo-text">
                PNK <span>INMOBILIARIA</span>
                <p>PNK El portal inmobiliario de Chile</p>
            </div>
        </div>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="propiedades.html">Propiedades</a>
            <a href="login.html">Ingresar</a>
            <a href="publicar.html" class="btn-publicar">Publicar</a>
        </div>
    </div>
        
        <div id="resultadosContainer">
            <div style="text-align: center; padding: 40px; color: #888;">Utiliza los filtros para buscar propiedades</div>
        </div>
    </div>
    
    <div class="footer"><p>PNK Portal Inmobiliario de Chile - Encuentra tu hogar</p></div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function buscarAvanzado() {
            const params = new URLSearchParams();
            if (document.getElementById('palabraClave').value) params.append('palabra', document.getElementById('palabraClave').value);
            if (document.getElementById('filtroTipo').value) params.append('tipo', document.getElementById('filtroTipo').value);
            if (document.getElementById('filtroOperacion').value) params.append('operacion', document.getElementById('filtroOperacion').value);
            if (document.getElementById('filtroComuna').value) params.append('comuna', document.getElementById('filtroComuna').value);
            if (document.getElementById('filtroProvincia').value) params.append('provincia', document.getElementById('filtroProvincia').value);
            if (document.getElementById('precioMin').value) params.append('precio_min', document.getElementById('precioMin').value);
            if (document.getElementById('precioMax').value) params.append('precio_max', document.getElementById('precioMax').value);
            if (document.getElementById('filtroDorm').value) params.append('dormitorios', document.getElementById('filtroDorm').value);
            
            fetch(`backend/buscarPropiedades.php?${params.toString()}`)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('resultadosContainer');
                    if (data.length === 0) {
                        container.innerHTML = '<div style="text-align:center; padding:40px;">🔍 No se encontraron propiedades con esos criterios</div>';
                        return;
                    }
                    
                    let html = '<div class="results-grid">';
                    data.forEach(prop => {
                        html += `
                            <div class="property-card" onclick="window.location.href='propiedad-detalle.html?id=${prop.id}'">
                                <div class="property-image" style="background-image: url('${prop.imagen_principal || 'https://via.placeholder.com/400x180?text=Propiedad'}')">
                                    <div class="property-price">${prop.precio_uf ? 'UF ' + prop.precio_uf : '$' + Number(prop.precio_clp).toLocaleString()}</div>
                                </div>
                                <div class="property-info">
                                    <div class="property-title">${prop.tipo || 'Propiedad'} en ${prop.comuna || 'Chile'}</div>
                                    <div class="property-location"><i class="fas fa-map-marker-alt"></i> ${prop.comuna || ''}, ${prop.provincia || ''}</div>
                                    <div class="property-details" style="font-size:0.7rem; color:#888; margin-top:5px;">
                                        ${prop.dormitorios || 0} dorm • ${prop.banos || 0} baños • ${prop.area_terreno || 0} m²
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                    container.innerHTML = html;
                })
                .catch(error => {
                    document.getElementById('resultadosContainer').innerHTML = '<div style="text-align:center; padding:40px;">Error en la búsqueda</div>';
                });
        }
        
        // Cargar filtros desde URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('tipo')) document.getElementById('filtroTipo').value = urlParams.get('tipo');
        if (urlParams.get('operacion')) document.getElementById('filtroOperacion').value = urlParams.get('operacion');
        if (urlParams.get('comuna')) document.getElementById('filtroComuna').value = urlParams.get('comuna');
        if (urlParams.get('ubicacion')) document.getElementById('filtroComuna').value = urlParams.get('ubicacion');
        
        if (urlParams.toString()) buscarAvanzado();
    </script>
</body>
</html>
